<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancer - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            background-image: radial-gradient(circle at 1px 1px, #34d39933 1px, transparent 0);
            background-size: 20px 20px;
            color: #e0e0e0;
            overscroll-behavior: none;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .lime-accent { background-color: #6ee7b7; color: #1a1a1a; }
        .lime-accent-hover:hover { background-color: #34d399; }
        .lime-border { border-color: #6ee7b7; }
        .lime-text { color: #6ee7b7; }

        .loader-container {
            display: none; /* Initially hidden */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-left-color: #6ee7b7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .drag-over { background-color: rgba(110, 231, 183, 0.1); }
        
        #comparison-wrapper { touch-action: none; }
        .comparison-slider {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
            background-color: #ffffff; cursor: ew-resize; transform: translateX(-2px); z-index: 20;
        }
        .comparison-handle {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            border: 2px solid white; border-radius: 50%; background-color: #6ee7b7;
            transform: translate(-50%, -50%); display: flex; align-items: center;
            justify-content: space-evenly; color: black; font-size: 14px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); pointer-events: none;
        }
        .comparison-handle::before { content: '◀'; }
        .comparison-handle::after { content: '▶'; }
        #original-comparison { z-index: 10; }
        #enhanced-image { z-index: 5; }

        .glass-input {
            background: rgb(81 166 210 / 8%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #42c789;
        }
        .glass-input:focus {
            outline: none; border-color: #6ee7b7; box-shadow: 0 0 0 2px rgba(110, 231, 183, 0.5);
        }
        #enhance-btn {
            background: #6ee7b7; color: #1a1a1a; border: 1px solid #6ee7b7;
        }
        #enhance-btn:hover {
            background: #34d399; box-shadow: 0 0 20px rgba(110, 231, 183, 0.7);
        }
        #enhance-btn:disabled {
            background-color: #4a5568;
            cursor: not-allowed;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-5xl mx-auto">
            
            <header class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-bold text-white mb-2">AI Super-Resolution <span class="lime-text">Client</span></h1>
                <p class="text-lg text-gray-300">A web interface for your powerful AI upscaling server.</p>
            </header>

            <div id="app-container" class="glass-panel p-6 md:p-8">

                <div id="upload-section">
                    <div id="drop-zone" class="border-2 border-dashed lime-border rounded-lg p-8 text-center cursor-pointer hover:bg-lime-400/[0.1] transition-colors duration-300">
                        <svg class="mx-auto h-12 w-12 lime-text" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
                        <p class="mt-2 text-gray-300"><span class="font-semibold lime-text">Click to upload</span> or drag and drop</p>
                        <input type="file" id="file-input" class="hidden" accept="image/png, image/jpeg, image/webp">
                    </div>
                </div>

                <div id="editor-section" class="hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-1 flex flex-col gap-4">
                            <!-- Controls Section -->
                            <div class="space-y-2">
                                <h3 class="text-lg font-semibold text-white">Original Image</h3>
                                <div class="glass-panel p-2"><img id="original-preview" src="#" alt="Original Image" class="w-full h-auto rounded-md object-contain max-h-64"></div>
                                <button id="change-image-btn" class="w-full text-center bg-white/10 hover:bg-white/20 border border-white/20 py-2 px-4 rounded-lg transition">Change Image</button>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label for="resolution-select" class="block text-sm font-medium text-gray-300 mb-1">Target Resolution</label>
                                    <select id="resolution-select" class="w-full glass-input rounded-lg p-2 transition"><option value="1280x720">720p (HD)</option><option value="1920x1080" selected>1080p (Full HD)</option><option value="3840x2160">4K (UHD)</option><option value="7680x4320">8K</option></select>
                                </div>
                                <!-- NEW: Engine Selection -->
                                <div>
                                    <label for="engine-select" class="block text-sm font-medium text-gray-300 mb-1">AI Engine</label>
                                    <select id="engine-select" class="w-full glass-input rounded-lg p-2 transition">
                                        <option value="realesrgan" selected>Real-ESRGAN (Default)</option>
                                        <option value="swinir">SwinIR</option>
                                        <option value="opencv">OpenCV (Fallback)</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="format-select" class="block text-sm font-medium text-gray-300 mb-1">Output Format</label>
                                    <select id="format-select" class="w-full glass-input rounded-lg p-2 transition"><option value="png" selected>PNG (Lossless)</option><option value="webp">WebP (Lossless)</option><option value="tiff">TIFF</option></select>
                                </div>
                                <button id="enhance-btn" class="w-full text-center font-bold py-3 px-4 rounded-lg transition flex items-center justify-center gap-2">Enhance Image</button>
                            </div>
                        </div>

                        <div class="md:col-span-2">
                             <!-- Output Section -->
                            <h3 class="text-lg font-semibold text-white mb-2">Enhanced Result</h3>
                            <div id="output-placeholder" class="glass-panel aspect-video flex items-center justify-center text-gray-400"><p>Your enhanced image will appear here</p></div>
                            <div id="output-loading" class="glass-panel aspect-video loader-container">
                                <div class="loader"></div>
                                <p id="loading-text">Contacting AI server...</p>
                            </div>
                            <div id="output-container" class="hidden relative w-full aspect-video glass-panel overflow-hidden">
                                <div id="comparison-wrapper" class="relative w-full h-full cursor-ew-resize">
                                    <img id="enhanced-image" src="#" alt="Enhanced Image" class="absolute inset-0 w-full h-full object-contain">
                                    <div id="original-comparison" class="absolute inset-0 w-1/2 h-full overflow-hidden">
                                        <img id="original-image-for-comparison" src="#" alt="Original Image" class="absolute inset-0 w-full h-full object-contain" style="max-width: none;">
                                    </div>
                                    <div id="comparison-slider" class="comparison-slider"><div class="comparison-handle"></div></div>
                                </div>
                            </div>
                            <div id="output-actions" class="mt-4 flex flex-col items-center justify-center gap-4 hidden">
                                 <button id="download-btn" class="lime-accent lime-accent-hover text-gray-900 font-bold py-2 px-4 rounded-lg transition flex items-center gap-2 w-full max-w-xs">Download Image</button>
                                <p id="error-message" class="text-sm text-red-400 text-center hidden"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer class="text-center mt-8"><p class="text-sm text-gray-500">&copy; 2025 AI Super-Resolution Client. All Rights Reserved.</p></footer>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- IMPORTANT: CONFIGURE YOUR SERVER ADDRESS HERE ---
    const API_ENDPOINT = 'https://image-quality-enhancer.onrender.com';
    // ---

    const elements = {
        dropZone: document.getElementById('drop-zone'),
        fileInput: document.getElementById('file-input'),
        uploadSection: document.getElementById('upload-section'),
        editorSection: document.getElementById('editor-section'),
        originalPreview: document.getElementById('original-preview'),
        changeImageBtn: document.getElementById('change-image-btn'),
        enhanceBtn: document.getElementById('enhance-btn'),
        resolutionSelect: document.getElementById('resolution-select'),
        engineSelect: document.getElementById('engine-select'),
        formatSelect: document.getElementById('format-select'),
        outputPlaceholder: document.getElementById('output-placeholder'),
        outputLoading: document.getElementById('output-loading'),
        loadingText: document.getElementById('loading-text'),
        outputContainer: document.getElementById('output-container'),
        outputActions: document.getElementById('output-actions'),
        errorMessage: document.getElementById('error-message'),
        enhancedImage: document.getElementById('enhanced-image'),
        downloadBtn: document.getElementById('download-btn'),
        comparisonWrapper: document.getElementById('comparison-wrapper'),
        originalComparison: document.getElementById('original-comparison'),
        originalImageForComparison: document.getElementById('original-image-for-comparison'),
        comparisonSlider: document.getElementById('comparison-slider'),
    };
    let originalFile = null;
    let enhancedImageBlobUrl = null;

    const handleFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        originalFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            const imgSrc = e.target.result;
            elements.originalPreview.src = imgSrc;
            elements.originalImageForComparison.src = imgSrc;
            const imgForSize = new Image();
            imgForSize.onload = () => {
                const wrapperRect = elements.comparisonWrapper.getBoundingClientRect();
                elements.originalImageForComparison.style.width = `${wrapperRect.width}px`;
            }
            imgForSize.src = imgSrc;
            elements.uploadSection.classList.add('hidden');
            elements.editorSection.classList.remove('hidden');
            resetOutput();
        };
        reader.readAsDataURL(file);
    };

    const resetOutput = () => {
        elements.outputPlaceholder.style.display = 'flex';
        elements.outputLoading.style.display = 'none';
        elements.outputContainer.classList.add('hidden');
        elements.outputActions.classList.add('hidden');
        elements.errorMessage.classList.add('hidden');
        elements.errorMessage.textContent = '';
        if (enhancedImageBlobUrl) {
            URL.revokeObjectURL(enhancedImageBlobUrl);
            enhancedImageBlobUrl = null;
        }
    };
    
    elements.dropZone.addEventListener('click', () => elements.fileInput.click());
    elements.fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      elements.dropZone.addEventListener(eventName, e => e.preventDefault());
      document.body.addEventListener(eventName, e => e.preventDefault());
    });
    elements.dropZone.addEventListener('dragover', () => elements.dropZone.classList.add('drag-over'));
    elements.dropZone.addEventListener('dragleave', () => elements.dropZone.classList.remove('drag-over'));
    elements.dropZone.addEventListener('drop', (e) => {
        elements.dropZone.classList.remove('drag-over');
        handleFile(e.dataTransfer.files[0]);
    });
    elements.changeImageBtn.addEventListener('click', () => {
        elements.uploadSection.classList.remove('hidden');
        elements.editorSection.classList.add('hidden');
        elements.fileInput.value = '';
        originalFile = null;
    });

    /**
     * NEW: API Call to the Super-Resolution Server
     */
    elements.enhanceBtn.addEventListener('click', async () => {
        if (!originalFile) return;

        resetOutput();
        elements.outputPlaceholder.style.display = 'none';
        elements.outputLoading.style.display = 'flex';
        elements.loadingText.textContent = 'Uploading and processing on AI server...';
        elements.enhanceBtn.disabled = true;

        const [target_w, target_h] = elements.resolutionSelect.value.split('x').map(Number);
        const engine = elements.engineSelect.value;
        const output_format = elements.formatSelect.value;

        const formData = new FormData();
        formData.append('image', originalFile);

        const url = `${API_ENDPOINT}/super-resolve?target_w=${target_w}&target_h=${target_h}&engine=${engine}&output_format=${output_format}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || `Server error: ${response.status}`);
            }

            const imageBlob = await response.blob();
            enhancedImageBlobUrl = URL.createObjectURL(imageBlob);

            elements.enhancedImage.src = enhancedImageBlobUrl;
            elements.outputLoading.style.display = 'none';
            elements.outputContainer.classList.remove('hidden');
            elements.outputActions.classList.remove('hidden');

        } catch (error) {
            console.error('Enhancement failed:', error);
            elements.outputLoading.style.display = 'none';
            elements.outputPlaceholder.style.display = 'flex'; // Show placeholder again on error
            elements.outputActions.classList.remove('hidden');
            elements.errorMessage.textContent = `Error: ${error.message}. Is the server running at ${API_ENDPOINT}?`;
            elements.errorMessage.classList.remove('hidden');
        } finally {
            elements.enhanceBtn.disabled = false;
        }
    });

    elements.downloadBtn.addEventListener('click', () => {
        if (!enhancedImageBlobUrl) return;
        const link = document.createElement('a');
        const extension = elements.formatSelect.value;
        const resolution = elements.resolutionSelect.options[elements.resolutionSelect.selectedIndex].text.split(' ')[0];
        link.download = `enhanced-${resolution}.${extension}`;
        link.href = enhancedImageBlobUrl;
        link.click();
    });

    let isDragging = false;
    const moveSlider = (clientX) => {
        const rect = elements.comparisonWrapper.getBoundingClientRect();
        let x = Math.max(0, Math.min(clientX - rect.left, rect.width));
        elements.originalComparison.style.width = `${x}px`;
        elements.comparisonSlider.style.left = `${x}px`;
    };

    elements.comparisonWrapper.addEventListener('mousedown', (e) => { isDragging = true; e.preventDefault(); });
    elements.comparisonWrapper.addEventListener('touchstart', (e) => { isDragging = true; e.preventDefault(); }, { passive: false });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('mousemove', (e) => { if (isDragging) moveSlider(e.clientX); });
    window.addEventListener('touchmove', (e) => { if (isDragging) moveSlider(e.touches[0].clientX); }, { passive: false });
});
</script>
</body>
</html>
